schema_version: 1

identity:
  name: hymt2-sequence-distillation-d0-v1
  status: frozen
  scope: bounded-train-only-eighteen-route-mvp

prompt_decode:
  path: configs/hymt2_teacher_prompt_decode.yaml
  file_sha256: 9c6dfc6048070fd8846343a49040211fff36ddf74d38992c745ed212ca9dbd8b
  calibration_report: artifacts/model-training/reports/teacher/calibration.json
  calibration_report_sha256: 7b36c77ebd423bfe8d94f47ba938130309189585f988394b30957d1d8b0bcfaf
  selected_profile: greedy-v1

input:
  path: data/model/history/m0-v1/corpus/mvp/finalized/train.jsonl
  file_sha256: 1fe762a4e219b3420b348a5e48806f7087ccd190295a947a966ea0e91ab22c5d
  m0_manifest: data/model/history/m0-v1/corpus/mvp/m0-manifest.json
  m0_manifest_sha256: 0d5a5d5039b110a92ce036db5dbaee5cd9fb9a491b24e9e467508bd5cfa3f482
  split: train
  dev_access: prohibited
  test_access: prohibited

sampling:
  unit: directed_sample
  records_per_route: 128
  total_records: 2304
  selection_seed: diesel-mt-td08-d0-v1
  order: frozen-route-order-then-selection-hash
  replacement: false

generation:
  shard_unit: route
  checkpoint_granularity: sample
  resume_identity: generation-contract-sha256
  raw_and_normalized_separate: true
  request_failure: stop-without-publish
  external_network: prohibited

manual_review:
  accepted_per_route: 20
  rejected_per_route: 20
  rejected_if_fewer: inspect-all
  traditional_targets_extra_review: true
  attestation: configs/hymt2_distillation_manual_review.yaml

replay:
  samples_per_route: 2
  exact_raw_output_required: true
  exact_normalized_output_required: true

acceptance_gates:
  minimum_accepted_per_route: 100
  minimum_route_accepted_rate: 0.90
  minimum_route_script_compliance_rate: 0.98
  maximum_route_retry_rate: 0.05
  require_all_eighteen_routes: true
  require_manual_review: true
  require_exact_replay: true
  require_zero_test_records: true

runtime:
  work_root_override_env: DIESEL_MT_DISTILLATION_WORK_ROOT
  default_work_root: data/model/interim/distillation-d0-v1

outputs:
  root: data/model/corpus/mvp/distilled/d0-v1
  generation_contract: data/model/corpus/mvp/distilled/d0-v1/generation-contract.json
  raw_subdir: raw
  accepted: data/model/corpus/mvp/distilled/d0-v1/accepted.jsonl
  filtered: data/model/corpus/mvp/distilled/d0-v1/filtered.jsonl
  manual_review_queue: data/model/reports/d0-manual-review.jsonl
  replay_report: data/model/reports/d0-replay.json
  quality_report: data/model/reports/d0-quality.json
  manifest: data/model/corpus/mvp/distilled/d0-v1/manifest.json
  evidence: artifacts/model-training/reports/teacher/distillation/d0.json
