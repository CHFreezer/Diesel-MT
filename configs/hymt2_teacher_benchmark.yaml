benchmark:
  quality_reference_variant: original-bf16
  seed: 20260715
  repeats: 2
  warmup_new_tokens: 8
  max_new_tokens: 32
  context_size: 512
  do_sample: false
  probes:
    - target_tag: eng_Latn
      prompt: "Translate the following text into English. Output only the translation, without explanation:\n\n今天天气很好。"
      expected_smoke_output: "The weather is nice today."
    - target_tag: zho_Hans
      prompt: "将以下文本翻译成简体中文，只输出译文，不要解释：\n\nThe weather is nice today."
      expected_smoke_output: "今天天气很好。"
    - target_tag: zho_Hant
      prompt: "將以下文本翻譯成繁體中文，只輸出譯文，不要解釋：\n\nThe weather is nice today."
      expected_smoke_output: "今天天氣很好。"
    - target_tag: jpn_Jpan
      prompt: "Translate the following text into Japanese. Output only the translation, without explanation:\n\nThe weather is nice today."
      expected_smoke_output: "今日は天気がいいですね。"
    - target_tag: kor_Hang
      prompt: "Translate the following text into Korean. Output only the translation, without explanation:\n\nThe weather is nice today."
      expected_smoke_output: "오늘 날씨가 좋아요."
  capacity_probe:
    scope: m0-maximum-train-source-characters
    source_characters: 189
    target_tag: jpn_Jpan
    max_new_tokens: 64
    prompt: "Translate the following text into Japanese. Output only the translation, without explanation:\n\nstart the gas stove adjust the flame to cooking the dish and put all cooking ingredient to pressure cooker to cook the ingredients keep it on the stove wait for the ingredients to be cooked"
