schema_version: 2

identity:
  name: hymt2-sequence-distillation-d1-zh-conversion-v2
  status: frozen
  scope: mvp-train-only-two-route-chinese-conversion-addendum

routes:
  - zho_Hans->zho_Hant
  - zho_Hant->zho_Hans

prompt_decode:
  path: configs/hymt2_teacher_prompt_decode_zh_conversion.yaml
  file_sha256: a8edab20edaa3f07d45b940c516066e50d3ec014e3e60b13e80865acfe6f2a86
  calibration_report: artifacts/model-training/reports/teacher/zh-conversion-calibration.json
  calibration_report_sha256: 31f1488e96150937a31dec8c1ec3ebf188495b31c329a242b60fa346af57a556
  selected_profile: greedy-v1

input:
  path: data/model/corpus/mvp/finalized/train.jsonl
  file_sha256: ba0a5361fc97ca3ecad76b25ac3cfccfe163be785fb68847d11ae909bddba1d8
  m0_manifest: data/model/corpus/mvp/m0-manifest.json
  m0_manifest_sha256: 8626a11db593d0843427a5da187ba1e4bf27299d0bd06d8d5430d19918f7e427
  split: train
  dev_access: prohibited
  test_access: prohibited

sampling:
  unit: directed_sample
  records_per_route: 2224
  total_records: 4448
  selection_seed: diesel-mt-td08-zh-conversion-v2
  order: frozen-route-order-then-selection-hash
  replacement: false

generation:
  shard_unit: route
  checkpoint_granularity: sample
  resume_identity: generation-contract-sha256
  raw_and_normalized_separate: true
  request_failure: stop-without-publish
  external_network: prohibited

manual_review:
  accepted_per_route: 20
  rejected_per_route: 20
  rejected_if_fewer: inspect-all
  traditional_targets_extra_review: true
  attestation: configs/hymt2_distillation_d1_zh_conversion_manual_review.yaml

replay:
  samples_per_route: 2
  exact_raw_output_required: true
  exact_normalized_output_required: true

acceptance_gates:
  minimum_accepted_per_route: 2000
  minimum_route_accepted_rate: 0.90
  minimum_route_script_compliance_rate: 0.98
  maximum_route_retry_rate: 0.05
  require_all_configured_routes: true
  require_manual_review: true
  require_exact_replay: true
  require_zero_test_records: true

runtime:
  work_root_override_env: DIESEL_MT_DISTILLATION_ZH_CONVERSION_WORK_ROOT
  default_work_root: data/model/interim/distillation-d1-zh-conversion

outputs:
  root: data/model/corpus/mvp/distilled/d1-zh-conversion
  generation_contract: data/model/corpus/mvp/distilled/d1-zh-conversion/generation-contract.json
  raw_subdir: raw
  accepted: data/model/corpus/mvp/distilled/d1-zh-conversion/accepted.jsonl
  filtered: data/model/corpus/mvp/distilled/d1-zh-conversion/filtered.jsonl
  manual_review_queue: data/model/reports/d1-zh-conversion-manual-review.jsonl
  replay_report: data/model/reports/d1-zh-conversion-replay.json
  quality_report: data/model/reports/d1-zh-conversion-quality.json
  manifest: data/model/corpus/mvp/distilled/d1-zh-conversion/manifest.json
  evidence: artifacts/model-training/reports/teacher/distillation/d1-zh-conversion.json
